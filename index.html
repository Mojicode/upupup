<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宏观经济驾驶舱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="投资驾驶舱">
    <link rel="apple-touch-icon" href="icon.png">
</head>
<body class="bg-gray-900 text-white p-8">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-3xl font-bold mb-2">宏观经济驾驶舱</h1>
        <p class="text-gray-400 mb-8 text-sm">数据更新时间: <span id="update-time">--</span></p>

        <div class="bg-gray-800 p-6 rounded-xl mb-6 flex items-center justify-between border border-gray-700">
            <div>
                <h2 class="text-xl font-semibold">宏观红绿灯状态</h2>
                <p id="light-desc" class="text-gray-400 text-sm mt-1">基于 CPI 与情绪加权计算</p>
            </div>
            <div id="light-circle" class="w-12 h-12 rounded-full bg-gray-600 shadow-lg"></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-gray-800 p-4 rounded-xl border border-blue-500/30 mb-6 flex items-center justify-between">
                <div>
                    <h3 class="text-blue-400 text-xs uppercase font-bold">距离下一次美联储议息 (FOMC)</h3>
                    <p id="fed-date" class="text-gray-500 text-xs italic">--</p>
                </div>
                <div class="text-right">
                    <span id="fed-countdown" class="text-2xl font-mono font-bold text-white">--</span>
                    <span class="text-gray-400 text-sm ml-1">天</span>
                </div>
            </div>
            <div id="fng-container" class="bg-gray-800 p-6 rounded-xl border border-gray-700 transition-colors duration-500">
                <h3 class="text-gray-400 text-xs uppercase tracking-wider mb-2">加密货币恐慌/贪婪指数</h3>
                <p id="fng-value" class="text-3xl font-bold italic">--</p>
                <div class="w-full bg-gray-700 h-2 mt-4 rounded-full overflow-hidden">
                    <div id="fng-bar" class="h-full transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>

            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 col-span-1 md:col-span-2">
                <h3 class="text-gray-400 text-xs uppercase tracking-wider mb-4">各国通胀率 (CPI %)</h3>
                <div id="cpi-list" class="grid grid-cols-2 sm:grid-cols-4 gap-4 text-center text-sm">
                    </div>
            </div>

            <div class="mt-8 p-4 rounded-lg bg-gray-800/50 border border-dashed border-gray-600 text-center">
                <p id="investment-quote" class="text-lg font-medium tracking-widest opacity-50 transition-all duration-700">
                    <span id="quote-buy">买在无人问津</span>
                    <span class="mx-2 text-gray-600">|</span>
                    <span id="quote-sell">卖在人声鼎沸</span>
                </p>
            </div>
        </div>
    </div>

    <script>
        // 定义获取颜色的辅助函数
        function getFngColor(value) {
            const val = parseInt(value);
            if (val <= 25) return { text: '极度恐慌', color: 'text-red-500', bg: 'bg-red-900/20', bar: 'bg-red-500', border: 'border-red-500/50' };
            if (val <= 45) return { text: '恐慌', color: 'text-orange-500', bg: 'bg-orange-900/20', bar: 'bg-orange-500', border: 'border-orange-500/30' };
            if (val <= 55) return { text: '中性', color: 'text-yellow-500', bg: 'bg-yellow-900/20', bar: 'bg-yellow-500', border: 'border-yellow-500/30' };
            if (val <= 75) return { text: '贪婪', color: 'text-lime-500', bg: 'bg-lime-900/20', bar: 'bg-lime-500', border: 'border-lime-500/30' };
            return { text: '极度贪婪', color: 'text-green-500', bg: 'bg-green-900/20', bar: 'bg-green-500', border: 'border-green-500/50' };
        }

        async function loadData() {
            try {
                const response = await fetch('./data.json');
                const data = await response.json();
                
                // 1. 更新时间
                document.getElementById('update-time').innerText = data.last_updated;
                
                // 2. 加密指数
                // --- 处理加密指数展示 ---
                const fngVal = data.crypto_fng.value;
                const theme = getFngColor(fngVal);

                const fngText = document.getElementById('fng-value');
                const fngContainer = document.getElementById('fng-container');
                const fngBar = document.getElementById('fng-bar');

                fngText.innerText = `${fngVal} - ${theme.text}`;
                fngText.className = `text-3xl font-bold italic ${theme.color}`;

                // 容器背景和边框跟随颜色变化
                fngContainer.className = `p-6 rounded-xl border transition-all duration-500 ${theme.bg} ${theme.border}`;

                // 进度条动画
                setTimeout(() => {
                    fngBar.style.width = `${fngVal}%`;
                    fngBar.className = `h-full transition-all duration-1000 ${theme.bar}`;
                }, 100);

                const fngInt = parseInt(fngVal);
                const quoteBuy = document.getElementById('quote-buy');
                const quoteSell = document.getElementById('quote-sell');
                const quoteParent = document.getElementById('investment-quote');

                // 重置样式
                quoteBuy.className = "transition-all duration-700";
                quoteSell.className = "transition-all duration-700";
                quoteParent.classList.remove('opacity-50'); // 激活容器可见度

                if (fngInt <= 30) {
                    // 极度恐慌：激活“买在无人问津”
                    quoteBuy.classList.add('text-red-500', 'text-xl', 'font-bold', 'drop-shadow-[0_0_8px_rgba(239,68,68,0.6)]');
                    quoteSell.classList.add('text-gray-600');
                } else if (fngInt >= 70) {
                    // 极度贪婪：激活“卖在人声鼎沸”
                    quoteSell.classList.add('text-green-500', 'text-xl', 'font-bold', 'drop-shadow-[0_0_8px_rgba(34,197,94,0.6)]');
                    quoteBuy.classList.add('text-gray-600');
                } else {
                    // 中性区间：保持低调
                    quoteBuy.classList.add('text-gray-400');
                    quoteSell.classList.add('text-gray-400');
                }

                // 在 loadData 函数中更新
                const nextMeeting = data.next_fed_meeting;
                document.getElementById('fed-date').innerText = `会议日期: ${nextMeeting}`;

                const targetDate = new Date(nextMeeting);
                const today = new Date();
                const diffTime = targetDate - today;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                const countdownEl = document.getElementById('fed-countdown');
                countdownEl.innerText = diffDays;

                // 变色逻辑：如果距离会议不到 3 天，显示红色预警波动
                if (diffDays <= 3) {
                    countdownEl.className = "text-2xl font-mono font-bold text-red-500 animate-pulse";
                }
                
                // 3. 渲染红绿灯
                const lightMap = { 
                    1: { color: 'bg-green-500 shadow-green-500/50', text: '当前环境：宜建仓/持有' }, 
                    2: { color: 'bg-yellow-500 shadow-yellow-500/50', text: '当前环境：中性观察' }, 
                    3: { color: 'bg-red-500 shadow-red-500/50', text: '当前环境：高风险预警' } 
                };
                const config = lightMap[data.macro_light] || { color: 'bg-gray-500', text: '状态未知' };
                document.getElementById('light-circle').className = `w-12 h-12 rounded-full shadow-lg ${config.color}`;
                document.getElementById('light-desc').innerText = config.text;

                // 4. 渲染 CPI 列表
                const cpiList = document.getElementById('cpi-list');
                const countriesMap = {
                    "USA": "美国", "CHN": "中国", "JPN": "日本", 
                    "GBR": "英国", "DEU": "德国", "IND": "印度", "BRA": "巴西"
                };
                
                Object.entries(data.inflation_rates).forEach(([code, info]) => {
                    const div = document.createElement('div');
                    div.className = "p-2 bg-gray-700/50 rounded";
                    div.innerHTML = `<p class="text-gray-400 text-xs">${countriesMap[code] || code}</p>
                                     <p class="text-lg font-mono">${info.value}%</p>`;
                    cpiList.appendChild(div);
                });

            } catch (e) {
                console.error("加载数据失败:", e);
                document.getElementById('light-desc').innerText = "加载 JSON 数据出错，请确保已运行 python 脚本。";
            }
        }
        loadData();
    </script>
</body>
</html>
